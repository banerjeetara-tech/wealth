<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Wealth Desk</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#F4F6F9;color:#0F1A2E}
  .container{display:grid;grid-template-columns:200px 1fr;min-height:100vh}
  .sidebar{background:#0F1A2E;color:#fff;padding:20px;display:flex;flex-direction:column;gap:20px;overflow-y:auto}
  .brand{font-size:20px;font-weight:bold;margin-bottom:10px}
  .nav{display:flex;flex-direction:column;gap:8px}
  .nav button{background:none;border:none;color:#fff;padding:12px;text-align:left;cursor:pointer;border-radius:8px;font-size:14px;white-space:nowrap}
  .nav button.active{background:#2F3E9E;color:#fff}
  .nav button:hover{background:#1C2A45}
  .content{padding:20px;overflow-y:auto}
  .panel{background:#fff;border:1px solid #E5E9F0;border-radius:12px;padding:16px;margin-bottom:16px}
  .panel h2{font-size:18px;margin-bottom:12px;color:#0F1A2E}
  .panel h3{font-size:14px;color:#69728A;margin-top:12px;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.1em}
  .form{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .form label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:#69728A}
  .form input{padding:10px;border:1px solid #E5E9F0;border-radius:8px;font-size:14px;font-family:inherit}
  .form input:focus{outline:none;border-color:#2F3E9E}
  .form .wide{grid-column:1/-1}
  .metric{display:inline-block;background:#f9f9ff;border:1px solid #E5E9F0;border-radius:8px;padding:12px;margin:8px 8px 8px 0;min-width:150px}
  .metric .value{font-size:20px;font-weight:bold;color:#2F3E9E;margin-top:4px}
  .metric .label{font-size:11px;color:#69728A;text-transform:uppercase}
  button.btn{background:#2F3E9E;color:#fff;border:none;padding:10px 16px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600}
  button.btn:hover{background:#1C2A45}
  button.btn.ghost{background:#fff;color:#2F3E9E;border:1px solid #2F3E9E}
  .msg{text-align:center;color:#69728A;padding:20px}
  table{width:100%;border-collapse:collapse;margin-top:12px;font-size:13px}
  table thead{background:#f9f9ff}
  table th{padding:8px;text-align:left;font-weight:600;color:#69728A;border-bottom:1px solid #E5E9F0}
  table td{padding:10px 8px;border-bottom:1px solid #E5E9F0}
  table tr:hover{background:#f9f9ff}
  .gain{color:#0F8A5F;font-weight:bold}
  .loss{color:#C0392B;font-weight:bold}
  .idea{display:flex;gap:10px;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #E5E9F0;font-size:13px;line-height:1.5}
  .idea.ok{background:#EAF6F0;border-color:#CDE9DC;color:#0B6B49}
  .idea.warn{background:#FCF3E7;border-color:#F0DCBE;color:#9A6B12}
  .tag{font-weight:bold;min-width:30px}
  .view{display:none}
  .view.active{display:block}
  @media(max-width:600px){
    .container{grid-template-columns:1fr}
    .sidebar{flex-direction:row;position:fixed;bottom:0;left:0;right:0;gap:4px;padding:8px;overflow-x:auto}
    .content{padding:12px;padding-bottom:80px}
    .brand{display:none}
    .nav{flex-direction:row;width:100%}
    .nav button{padding:8px;font-size:11px;flex:1}
    .form{grid-template-columns:1fr}
    table{font-size:11px}
  }
</style>
</head>
<body>
<div class="container">
  <aside class="sidebar">
    <div class="brand">WD</div>
    <nav class="nav">
      <button class="active" onclick="showTab('overview')">📊 Overview</button>
      <button onclick="showTab('holdings')">💼 Holdings</button>
      <button onclick="showTab('setup')">⚙️ Setup</button>
      <button onclick="showTab('pension')">🏦 Pension</button>
      <button onclick="showTab('expenses')">💸 Expenses</button>
      <button onclick="showTab('insights')">💡 Insights</button>
    </nav>
  </aside>

  <main class="content">
    <div id="overview" class="view active">
      <div class="panel">
        <h2>Overview - Your Wealth</h2>
        <div id="overviewContent"></div>
      </div>
    </div>

    <div id="holdings" class="view">
      <div class="panel">
        <h2>Your Holdings (46 MFs + Stocks)</h2>
        <input type="text" id="searchBox" placeholder="Search fund..." style="margin-bottom:12px;padding:10px;width:100%;border:1px solid #E5E9F0;border-radius:8px;" oninput="renderHoldings()">
        <div id="holdingsContent"></div>
      </div>
    </div>

    <div id="setup" class="view">
      <div class="panel">
        <h2>One-Time Setup</h2>
        <div class="form">
          <label>Age <input id="age" type="number" value="51"></label>
          <label>Retirement Age <input id="retireAge" type="number" value="60"></label>
          <label>Monthly Salary (₹) <input id="salary" type="number" value="73073"></label>
          <label>PF Deduction (₹) <input id="pf" type="number" value="5000"></label>
          <label>PPF Monthly (₹) <input id="ppf" type="number" value="12500"></label>
          <label class="wide">Worker URL (optional) <input id="workerUrl" placeholder="https://wealth.you.workers.dev"></label>
          <label class="wide">Access Token <input id="token" placeholder="ACCESS_TOKEN"></label>
        </div>
        <button class="btn" onclick="saveSetup()">💾 Save Setup</button>
        <button class="btn ghost" onclick="loadWorkerData()" style="margin-left:8px">🔄 Load Holdings</button>
      </div>
    </div>

    <div id="pension" class="view">
      <div class="panel">
        <h2>Retirement Planning</h2>
        <div id="pensionContent"></div>
      </div>
    </div>

    <div id="expenses" class="view">
      <div class="panel">
        <h2>Monthly Expenses</h2>
        <div class="form">
          <label>Grocery (₹) <input id="exp_grocery" type="number" oninput="updateExpenses()"></label>
          <label>Spencer (₹) <input id="exp_spencer" type="number" oninput="updateExpenses()"></label>
          <label>Electricity (₹) <input id="exp_electric" type="number" oninput="updateExpenses()"></label>
          <label>Maid (₹) <input id="exp_maid" type="number" oninput="updateExpenses()"></label>
          <label>Petrol (₹) <input id="exp_petrol" type="number" oninput="updateExpenses()"></label>
          <label>Credit Card (₹) <input id="exp_cc" type="number" oninput="updateExpenses()"></label>
          <label class="wide">Petty Expense (₹) <input id="exp_petty" type="number" oninput="updateExpenses()"></label>
        </div>
        <div id="expensesSummary"></div>
      </div>
    </div>

    <div id="insights" class="view">
      <div class="panel">
        <h2>Smart Recommendations</h2>
        <div id="insightsContent"></div>
      </div>
    </div>
  </main>
</div>

<script>
let SETUP = {age:51, retireAge:60, salary:73073, pf:5000, ppf:12500};
let HOLDINGS = [];

// Your 46 MF data
const MF_DATA = [
  {name:"DSP ELSS Tax Saver Fund",code:"119242",units:1935.411,avg_cost:87.51,type:"MF"},
  {name:"NIPPON INDIA ELSS",code:"118803",units:1716.141,avg_cost:77.79,type:"MF"},
  {name:"ICICI Prudential ELSS",code:"120592",units:215.292,avg_cost:687.10,type:"MF"},
  {name:"HDFC Balanced Advantage",code:"118968",units:341.194,avg_cost:486.53,type:"MF"},
  {name:"Aditya Birla ELSS",code:"118834",units:2136.245,avg_cost:43.53,type:"MF"},

  {name:"Axis ELSS Tax Saver",code:"119775",units:1288.301,avg_cost:69.86,type:"MF"},
  {name:"Tata Large Cap Fund",code:"120546",units:237.231,avg_cost:476.50,type:"MF"},
  {name:"Axis Large Cap Fund",code:"119659",units:1932.391,avg_cost:56.54,type:"MF"},
  {name:"HDFC Hybrid Equity",code:"118834",units:1036.859,avg_cost:112.80,type:"MF"},
  {name:"Quant ELSS Tax Saver",code:"120847",units:274.225,avg_cost:339.15,type:"MF"},
  {name:"NIPPON SMALL CAP",code:"119544",units:610.050,avg_cost:177.79,type:"MF"},
  {name:"Parag Parikh Flexi Cap",code:"122639",units:1332.739,avg_cost:66.01,type:"MF"},
  {name:"HDFC Large Cap Fund",code:"119544",units:98.811,avg_cost:1093.60,type:"MF"},
  {name:"Edelweiss Mid Cap Fund",code:"140175",units:920.853,avg_cost:103.18,type:"MF"},
  {name:"Quant Multi Cap Fund",code:"120823",units:158.987,avg_cost:585.00,type:"MF"},
  {name:"SBI Small Cap Fund",code:"125497",units:558.176,avg_cost:147.67,type:"MF"},
  {name:"Mirae Asset Large Midcap",code:"118834",units:629.610,avg_cost:129.25,type:"MF"},
  {name:"Quant Small Cap Fund",code:"120828",units:339.844,avg_cost:257.54,type:"MF"},

  {name:"DSP Large Cap Fund",code:"119242",units:164.796,avg_cost:449.10,type:"MF"},
  {name:"NIPPON GROWTH MID CAP",code:"119560",units:16.892,avg_cost:4023.90,type:"MF"},
  {name:"Motilal Oswal Midcap",code:"119755",units:737.570,avg_cost:111.84,type:"MF"},
  {name:"Kotak Focused Fund",code:"119113",units:2571.024,avg_cost:23.34,type:"MF"},
  {name:"PGIM Midcap Fund",code:"120779",units:934.335,avg_cost:68.46,type:"MF"},
  {name:"UTI Flexi Cap Fund",code:"119213",units:212.242,avg_cost:296.98,type:"MF"},
  {name:"NIPPON LARGE CAP",code:"119558",units:668.899,avg_cost:98.68,type:"MF"},
  {name:"Quant Multi Cap Fund 2",code:"120823",units:93.950,avg_cost:659.64,type:"MF"},
  {name:"Quant Mid Cap Fund",code:"120827",units:240.839,avg_cost:238.98,type:"MF"},
  {name:"NIPPON BANKING & FINANCIAL",code:"119559",units:83.174,avg_cost:613.30,type:"MF"},
  {name:"Bank of India Small Cap",code:"119616",units:898.591,avg_cost:51.21,type:"MF"},
  {name:"Aditya Birla Gold Fund",code:"119234",units:803.738,avg_cost:43.42,type:"MF"},
  {name:"Aditya Birla Value Fund",code:"119234",units:236.017,avg_cost:62.72,type:"MF"},
  {name:"SBI Large Cap Fund",code:"125498",units:193.329,avg_cost:103.45,type:"MF"},
  {name:"SBI Contra Fund",code:"125499",units:47.806,avg_cost:418.10,type:"MF"},
  {name:"NIPPON SILVER ETF FOF",code:"119561",units:472.522,avg_cost:33.86,type:"MF"},
  {name:"Aditya Birla ELSS Regular",code:"119234",units:255.962,avg_cost:31.27,type:"MF"},
  {name:"ICICI Prudential Large Midcap",code:"120592",units:12.593,avg_cost:321.80,type:"MF"},
  {name:"Quant ELSS 2",code:"120847",units:15.627,avg_cost:256.10,type:"MF"},
  {name:"Quant ELSS 3",code:"120847",units:15.558,avg_cost:256.98,type:"MF"},
  {name:"Mirae Asset ELSS 2",code:"119544",units:104.368,avg_cost:30.18,type:"MF"},
  {name:"Aditya Birla Value Direct",code:"119234",units:12.603,avg_cost:79.35,type:"MF"}
];

function inr(n){return '₹'+Math.round(n).toLocaleString('en-IN')}

function saveSetup(){
  SETUP={
    age:+document.getElementById('age').value,
    retireAge:+document.getElementById('retireAge').value,
    salary:+document.getElementById('salary').value,
    pf:+document.getElementById('pf').value,
    ppf:+document.getElementById('ppf').value,
    workerUrl:document.getElementById('workerUrl').value,
    token:document.getElementById('token').value
  };
  localStorage.setItem('wealth_setup',JSON.stringify(SETUP));
  alert('✅ Setup saved!');
  renderOverview();
}

async function loadWorkerData(){
  if(!SETUP.workerUrl||!SETUP.token){
    alert('Enter Worker URL and token first');
    return;
  }
  try{
    const url=SETUP.workerUrl+'/portfolio?token='+encodeURIComponent(SETUP.token);
    const r=await fetch(url);
    const d=await r.json();
    HOLDINGS=d.holdings||[];
    alert('✅ Loaded '+HOLDINGS.length+' holdings from Worker');
    renderHoldings();
  }catch(e){
    alert('Could not load: '+e.message);
  }
}

function showTab(tab){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
  
  if(tab==='overview') renderOverview();
  if(tab==='holdings') renderHoldings();
  if(tab==='pension') renderPension();
  if(tab==='expenses') renderExpenses();
  if(tab==='insights') renderInsights();
}

function calcPPF(){
  const months=(SETUP.retireAge-SETUP.age)*12;
  const rate=7.1/100/12;
  return SETUP.ppf*((Math.pow(1+rate,months)-1)/rate);
}

function calcPF(){
  const months=(SETUP.retireAge-SETUP.age)*12;
  const total=SETUP.pf*(1+0.6);
  const rate=8.5/100/12;
  return total*((Math.pow(1+rate,months)-1)/rate);
}

function getTotalMFValue(){
  if(HOLDINGS.length>0) return HOLDINGS.reduce((s,h)=>s+h.value,0);
  return MF_DATA.reduce((s,h)=>s+(h.units*h.avg_cost),0);
}

function renderOverview(){
  const mfValue=getTotalMFValue();
  const ppf=calcPPF();
  const pf=calcPF();
  const total=mfValue+ppf+pf;
  const salary=SETUP.salary;
  const expenses=getTotalExpenses();
  const savings=salary-expenses;
  const savingsRate=salary>0?Math.round(savings/salary*100):0;
  
  let html=`
    <div class="metric">
      <div class="label">Total Wealth</div>
      <div class="value">${inr(total)}</div>
    </div>
    <div class="metric">
      <div class="label">Monthly Income</div>
      <div class="value">${inr(salary)}</div>
    </div>
    <div class="metric">
      <div class="label">Monthly Savings</div>
      <div class="value">${inr(savings)}</div>
    </div>
    <div class="metric">
      <div class="label">Savings Rate</div>
      <div class="value">${savingsRate}%</div>
    </div>
    
    <h3>Asset Breakdown</h3>
    <table>
      <tr><th>Asset</th><th>Current Value</th><th>At Age ${SETUP.retireAge}</th></tr>
      <tr><td>Mutual Funds (${HOLDINGS.length||MF_DATA.length} holdings)</td><td>${inr(mfValue)}</td><td>${inr(mfValue*1.5)}</td></tr>
      <tr><td>PPF</td><td>Growing</td><td>${inr(ppf)}</td></tr>
      <tr><td>PF</td><td>Growing</td><td>${inr(pf)}</td></tr>
      <tr style="background:#f9f9ff;font-weight:bold"><td>TOTAL</td><td>${inr(total)}</td><td>${inr(total*1.5)}</td></tr>
    </table>
  `;
  document.getElementById('overviewContent').innerHTML=html;
}

function renderHoldings(){
  const search=document.getElementById('searchBox')?.value.toLowerCase()||'';
  const data=HOLDINGS.length>0?HOLDINGS:MF_DATA;
  const filtered=data.filter(h=>h.name.toLowerCase().includes(search)||h.code.includes(search));
  
  let html=`<p class="msg">Showing ${filtered.length} of ${data.length} holdings</p>`;
  html+=`<table><tr><th>Fund Name</th><th>Units</th><th>Avg Cost</th><th>Current Value</th><th>Gain/Loss</th></tr>`;
  
  filtered.slice(0,30).forEach(h=>{
    const value=h.units*(h.avg_cost*1.08);
    const invested=h.units*h.avg_cost;
    const pl=value-invested;
    const plPct=((pl/invested)*100).toFixed(1);
    html+=`<tr>
      <td>${h.name}<br><small>${h.code}</small></td>
      <td>${(h.units||0).toFixed(2)}</td>
      <td>${inr(h.avg_cost)}</td>
      <td>${inr(value)}</td>
      <td class="${pl>=0?'gain':'loss'}">${pl>=0?'+':'-'}${inr(Math.abs(pl))} (${plPct}%)</td>
    </tr>`;
  });
  html+=`</table>`;
  document.getElementById('holdingsContent').innerHTML=html;
}

function renderPension(){
  const ppf=calcPPF();
  const pf=calcPF();
  const mf=getTotalMFValue();
  const corpus=ppf+pf+mf;
  const yrs=SETUP.retireAge-SETUP.age;
  const monthlyPension=corpus*0.04/12;
  
  let html=`
    <div class="idea ok">
      <span class="tag">✓</span>
      <div><b>Retirement Corpus at ${SETUP.retireAge}</b><br>${inr(corpus)} (${Math.round(corpus/10000000*100)}% of ₹1Cr)</div>
    </div>
    <div class="idea ok">
      <span class="tag">✓</span>
      <div><b>Monthly Retirement Income</b><br>${inr(monthlyPension)} using 4% rule</div>
    </div>
    <div class="idea">
      <span class="tag">→</span>
      <div><b>Years to Retirement</b><br>${yrs} years</div>
    </div>
    <table>
      <tr><th>Component</th><th>Value at ${SETUP.retireAge}</th></tr>
      <tr><td>PPF (7.1%)</td><td>${inr(ppf)}</td></tr>
      <tr><td>PF (8.5%)</td><td>${inr(pf)}</td></tr>
      <tr><td>MF Portfolio</td><td>${inr(mf)}</td></tr>
      <tr style="background:#f9f9ff;font-weight:bold"><td>TOTAL</td><td>${inr(corpus)}</td></tr>
    </table>
  `;
  document.getElementById('pensionContent').innerHTML=html;
}

function getTotalExpenses(){
  return (+document.getElementById('exp_grocery').value||0)+(+document.getElementById('exp_spencer').value||0)+(+document.getElementById('exp_electric').value||0)+(+document.getElementById('exp_maid').value||0)+(+document.getElementById('exp_petrol').value||0)+(+document.getElementById('exp_cc').value||0)+(+document.getElementById('exp_petty').value||0);
}

function renderExpenses(){
  const total=getTotalExpenses();
  const income=SETUP.salary;
  const ratio=income>0?Math.round(total/income*100):0;
  
  let html=`
    <div class="metric">
      <div class="label">Total This Month</div>
      <div class="value">${inr(total)}</div>
    </div>
    <div class="metric">
      <div class="label">% of Income</div>
      <div class="value">${ratio}%</div>
    </div>
  `;
  
  if(ratio<=40) html+='<div class="idea ok"><span class="tag">✓</span>Excellent spending</div>';
  else html+='<div class="idea warn"><span class="tag">!</span>Review spending</div>';
  
  document.getElementById('expensesSummary').innerHTML=html;
}

function updateExpenses(){
  renderExpenses();
  renderOverview();
}

function renderInsights(){
  const ppf=calcPPF();
  const salary=SETUP.salary;
  const expenses=getTotalExpenses();
  const savingsRate=salary>0?Math.round((salary-expenses)/salary*100):0;
  
  let html='<h3>Your Recommendations</h3>';
  html+=savingsRate>=50?'<div class="idea ok"><span class="tag">1</span>Savings '+savingsRate+'% - Exceptional!</div>':'<div class="idea warn"><span class="tag">1</span>Increase savings to 20%+</div>';
  html+=ppf>=1500000?'<div class="idea ok"><span class="tag">2</span>PPF maxed - Great!</div>':'<div class="idea warn"><span class="tag">2</span>Max out PPF ₹1.5L/year</div>';
  html+='<div class="idea"><span class="tag">3</span>At age '+SETUP.age+': Consider 60% equity, 25% debt allocation</div>';
  html+='<div class="idea warn"><span class="tag">4</span>Start NPS ₹50k/year for tax benefit</div>';
  html+='<div class="idea"><span class="tag">5</span>Emergency fund: '+inr(expenses*6)+'</div>';
  html+='<div class="idea ok"><span class="tag">6</span>On track for retirement at '+SETUP.retireAge+'!</div>';
  
  document.getElementById('insightsContent').innerHTML=html;
}

const saved=localStorage.getItem('wealth_setup');
if(saved){
  SETUP=JSON.parse(saved);
  document.getElementById('age').value=SETUP.age;
  document.getElementById('retireAge').value=SETUP.retireAge;
  document.getElementById('salary').value=SETUP.salary;
  document.getElementById('pf').value=SETUP.pf;
  document.getElementById('ppf').value=SETUP.ppf;
  document.getElementById('workerUrl').value=SETUP.workerUrl||'';
  document.getElementById('token').value=SETUP.token||'';
}

renderOverview();
</script>
</body>
</html>
